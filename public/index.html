<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filester Downloader</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem 8rem;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            min-width: 0;
        }
        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            background: #3b82f6;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        .files { display: flex; flex-direction: column; gap: 0.5rem; }
        .file-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
        }
        .file-name {
            flex: 1 1 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .file-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .btn-copy, .btn-download {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .btn-download { background: #22c55e; color: white; }
        .btn-download:hover { background: #16a34a; }
        .btn-download:disabled { background: #64748b; cursor: not-allowed; }
        .btn-copy { background: #475569; color: white; }
        .btn-copy:hover { background: #334155; }
        .file-status {
            width: 100%;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
        .file-status.idle { color: #64748b; }
        .file-status.downloading { color: #3b82f6; }
        .file-status.done { color: #22c55e; }
        .file-status.error { color: #fca5a5; }
        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fecaca;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            word-break: break-word;
        }
        .progress-container {
            display: none;
            margin-bottom: 1.5rem;
        }
        .progress-message {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #e2e8f0;
            word-break: break-word;
        }
        .progress-bar-wrapper {
            background: #1e293b;
            border-radius: 0.5rem;
            height: 1.5rem;
            overflow: hidden;
        }
        .progress-bar {
            background: #3b82f6;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-time {
            margin-top: 0.3rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .message-history {
            margin-top: 0.5rem;
            max-height: 220px;
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.5rem;
            font-size: 0.85rem;
        }
        .history-entry {
            padding: 0.25rem 0;
            border-bottom: 1px solid #0f172a;
            color: #e2e8f0;
            word-break: break-word;
        }
        .history-entry:last-child { border-bottom: none; }
        .history-entry.history-done { color: #22c55e; font-weight: 500; }
        .history-entry.history-error { color: #fecaca; }
        .toast {
            position: fixed;
            bottom: 7rem;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .file-url-row {
            font-size: 0.75rem;
            color: #94a3b8;
            word-break: break-all;
            padding: 0.1rem 0 0.5rem 0.5rem;
            cursor: pointer;
        }
        .file-url-row:hover { color: #e2e8f0; }
        .floating-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            border-top: 2px solid #334155;
            padding: 0.75rem 1rem;
            display: none;
            z-index: 100;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.35);
        }
        .floating-bar-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .floating-bar .progress-message {
            flex: 1 1 200px;
            margin: 0;
            font-size: 0.85rem;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .floating-bar .progress-time {
            margin: 0;
            font-size: 0.8rem;
            color: #94a3b8;
            white-space: nowrap;
        }
        .floating-bar button {
            white-space: nowrap;
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
        }
        @media (max-width: 600px) {
            body { margin: 1rem auto; padding: 0 0.75rem 8rem; }
            .input-group { flex-direction: column; gap: 0.5rem; }
            .input-group button { width: 100%; }
            .file-item { flex-direction: column; align-items: flex-start; }
            .file-name { flex: 1 1 auto; width: 100%; }
            .file-actions { width: 100%; justify-content: stretch; }
            .file-actions button { flex: 1; justify-content: center; text-align: center; }
            .floating-bar-inner { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <h1>Filester Downloader</h1>
    <div id="error" class="error" style="display: none;"></div>
    <div class="input-group">
        <input type="text" id="url" placeholder="https://filester.si/f/..." />
        <button id="fetch" onclick="fetchFiles()">Fetch Links</button>
    </div>
    <div id="progress-container" class="progress-container">
        <div id="progress-message" class="progress-message"></div>
        <div class="progress-bar-wrapper">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-time" class="progress-time"></div>
        <div id="message-history" class="message-history"></div>
    </div>
    <div id="files" class="files"></div>
    <div id="toast" class="toast"></div>

    <div id="floating-bar" class="floating-bar">
        <div class="floating-bar-inner">
            <div id="floating-message" class="progress-message"></div>
            <div id="floating-time" class="progress-time">0s</div>
            <button id="zip-btn" onclick="downloadAllZip()">Download All (ZIP)</button>
        </div>
    </div>

    <script>
        let eventSource = null;
        let sessionId = null;
        let fetchedFiles = [];
        let nextReconnectDelay = 0;
        let reconnectTimer = null;
        const downloadStates = new Map();

        function connectStream(sid) {
            if (eventSource) eventSource.close();

            eventSource = new EventSource(`/api/stream?sessionId=${sid}`);

            eventSource.onopen = () => {
                nextReconnectDelay = 0;
                const btn = document.getElementById('fetch');
                if (btn) btn.textContent = 'Running...';
            };

            eventSource.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    updateProgress(data);
                } catch {}
            };

            eventSource.onerror = () => {
                eventSource.close();
                eventSource = null;

                const delay = nextReconnectDelay;
                nextReconnectDelay = 500;
                reconnectTimer = setTimeout(() => {
                    reconnectTimer = null;
                    if (sessionId && !eventSource) connectStream(sessionId);
                }, delay);
            };
        }

        function updateFloatingProgress(message, elapsed) {
            document.getElementById('floating-message').textContent = message || '';
            if (elapsed !== undefined) {
                document.getElementById('floating-time').textContent = `${elapsed.toFixed(1)}s`;
            }
        }

        function resetProgress() {
            const container = document.getElementById('progress-container');
            const history = document.getElementById('message-history');
            if (container) {
                container.style.display = 'none';
                document.getElementById('progress-bar').style.width = '0%';
                document.getElementById('progress-message').textContent = '';
                document.getElementById('progress-time').textContent = '';
            }
            if (history) history.innerHTML = '';
        }

        function addLogEntry(text, type) {
            const history = document.getElementById('message-history');
            if (!history) return;
            const entry = document.createElement('div');
            entry.className = 'history-entry';
            if (type === 'done') entry.classList.add('history-done');
            if (type === 'error') entry.classList.add('history-error');
            entry.textContent = text;
            history.prepend(entry);
            while (history.children.length > 50) history.removeChild(history.lastChild);
        }

        function updateProgress(data) {
            const container = document.getElementById('progress-container');
            const bar = document.getElementById('progress-bar');
            const msg = document.getElementById('progress-message');
            const time = document.getElementById('progress-time');

            if (!container || !bar || !msg || !time) return;
            container.style.display = 'block';

            if (data.type === 'heartbeat') return;

            if (data.type === 'progress') {
                const isZipPhase = data.phase === 'downloading' || data.phase === 'packing';
                if (isZipPhase) showFloatingBar(true);
                updateFloatingProgress(data.message, data.elapsed);

                const percent = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
                bar.style.width = percent + '%';
                msg.textContent = data.message || '';

                let eta = '--';
                if (data.elapsed && data.elapsed > 0 && data.current > 0 && data.total > data.current) {
                    const remaining = data.total - data.current;
                    const etaSec = ((data.elapsed / data.current) * remaining);
                    eta = `~${Math.ceil(etaSec)}s`;
                }
                time.textContent = `${percent}% · ${data.current}/${data.total} · ETA ${eta}`;

                if (data.phase === 'downloading_item') {
                    if (data.current === data.total && data.total > 0) {
                        const slug = data.message.replace('Downloaded: ', '');
                        setFileStatus(slug, 'done', 'Downloaded ✓');
                    } else if (data.message.startsWith('Failed:')) {
                        const slug = data.message.replace('Failed: ', '');
                        setFileStatus(slug, 'error', 'Failed ✗');
                    }
                }

                const loggable =
                    data.message.startsWith('Page info:') ||
                    data.message.startsWith('Discovered') ||
                    data.message.startsWith('Resolved') ||
                    data.message.startsWith('Packed') ||
                    data.message.startsWith('Starting download') ||
                    (data.current === data.total && data.total > 0);

                if (loggable) addLogEntry(data.message, 'progress');
            } else if (data.type === 'info') {
                msg.textContent = data.message || '';
                if (data.message && !data.message.includes('Attempt ')) addLogEntry(data.message, 'info');
            } else if (data.type === 'done') {
                bar.style.width = '100%';
                time.textContent = '100% · Complete';
                msg.textContent = data.message || 'Done';
                addLogEntry(data.message || 'All done', 'done');
                const zipBtn = document.getElementById('zip-btn');
                if (zipBtn) zipBtn.disabled = false;
            }
        }

        function setFileStatus(slug, status, text) {
            downloadStates.set(slug, status);
            const row = document.querySelector(`[data-slug="${CSS.escape(slug)}"] .file-status`);
            if (row) {
                row.className = 'file-status ' + status;
                row.textContent = text;
            }
            const btn = document.querySelector(`[data-slug="${CSS.escape(slug)}"] .btn-download`);
            if (btn && status === 'done') {
                btn.textContent = 'Download Again';
                btn.disabled = false;
            }
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function buildDirectUrl(file) {
            return `${file.server}/v2/${file.file}?token=${encodeURIComponent(file.token)}&download=true&n=${encodeURIComponent(file.name)}`;
        }

        function renderFiles(files) {
            const filesEl = document.getElementById('files');
            filesEl.innerHTML = '';
            if (files.length === 0) {
                filesEl.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:1rem;">No files found</div>';
                return;
            }

            const copyBtn = document.createElement('button');
            copyBtn.className = 'btn-copy';
            copyBtn.textContent = 'Copy All Links';
            copyBtn.style.marginBottom = '0.75rem';
            copyBtn.onclick = () => {
                const links = files.map(f => buildDirectUrl(f)).join('\n');
                navigator.clipboard.writeText(links).then(() => showToast('Links copied')).catch(() => showToast('Failed to copy'));
            };
            filesEl.appendChild(copyBtn);

            for (const file of files) {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.dataset.slug = file.file;

                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.title = file.name;
                nameSpan.textContent = file.name;

                const actions = document.createElement('div');
                actions.className = 'file-actions';

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'btn-download';
                downloadBtn.textContent = 'Download';

                downloadBtn.onclick = async () => {
                    if (downloadStates.get(file.file) === 'downloading') return;
                    downloadBtn.disabled = true;
                    downloadBtn.textContent = 'Downloading...';
                    setFileStatus(file.file, 'downloading', 'Downloading...');

                    try {
                        const res = await fetch('/api/download-item', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sessionId, file }),
                        });
                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}));
                            setFileStatus(file.file, 'error', 'Failed: ' + (err.error || ''));
                        }
                    } catch {
                        setFileStatus(file.file, 'error', 'Network error');
                    }
                };

                const copyLinkBtn = document.createElement('button');
                copyLinkBtn.className = 'btn-copy';
                copyLinkBtn.textContent = 'Copy Link';
                copyLinkBtn.onclick = () => {
                    navigator.clipboard.writeText(buildDirectUrl(file)).then(() => showToast('Direct link copied')).catch(() => showToast('Failed to copy'));
                };

                actions.appendChild(downloadBtn);
                actions.appendChild(copyLinkBtn);

                const statusSpan = document.createElement('span');
                statusSpan.className = 'file-status idle';
                statusSpan.textContent = '';

                div.appendChild(nameSpan);
                div.appendChild(actions);
                div.appendChild(statusSpan);
                filesEl.appendChild(div);

                const urlRow = document.createElement('div');
                urlRow.className = 'file-url-row';
                urlRow.textContent = buildDirectUrl(file);
                urlRow.title = 'Click to copy direct download link';
                urlRow.onclick = () => {
                    navigator.clipboard.writeText(buildDirectUrl(file)).then(() => showToast('Direct link copied')).catch(() => showToast('Failed to copy'));
                };
                filesEl.appendChild(urlRow);

                downloadStates.set(file.file, 'idle');
            }
        }

        async function downloadAllZip() {
            const zipBtn = document.getElementById('zip-btn');
            zipBtn.disabled = true;
            zipBtn.textContent = 'Downloading ZIP...';

            const folderMatch = (document.getElementById('url').value || '').match(/\/f\/([^?]+)/);
            const folderName = folderMatch ? folderMatch[1] : 'files';

            try {
                const res = await fetch('/api/download-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: fetchedFiles, folderName, sessionId }),
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || 'Failed to create zip');
                }

                const zipBlob = await res.blob();
                const zipUrl = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = zipUrl;
                a.download = folderName + '.zip';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(zipUrl), 5000);
                showToast('ZIP download started');
            } catch (err) {
                showError(err.message);
            } finally {
                zipBtn.disabled = false;
                zipBtn.textContent = 'Download All (ZIP)';
            }
        }

        async function fetchFiles() {
            const url = document.getElementById('url').value.trim();
            const errorEl = document.getElementById('error');
            const filesEl = document.getElementById('files');
            const btn = document.getElementById('fetch');
            const zipBtn = document.getElementById('zip-btn');
            if (!url) { showError('Please enter a URL'); return; }

            errorEl.style.display = 'none';
            filesEl.innerHTML = '';
            resetProgress();
            showFloatingBar(false);
            if (zipBtn) { zipBtn.disabled = true; zipBtn.textContent = 'Download All (ZIP)'; }
            fetchedFiles = [];
            downloadStates.clear();

            sessionId = Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

            if (eventSource) { eventSource.close(); eventSource = null; }
            connectStream(sessionId);

            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                const res = await fetch('/api/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, sessionId }),
                });
                const data = await res.json();

                if (!res.ok || data.error) {
                    throw new Error(data.error || 'Failed to fetch files');
                }

                fetchedFiles = data.files;
                renderFiles(fetchedFiles);
                btn.textContent = 'Fetch Links';
                if (zipBtn) zipBtn.disabled = false;
                if (zipBtn) connectStream(sessionId);
            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Fetch Links';
            }
        }

        document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') fetchFiles(); });

        window.addEventListener('beforeunload', () => {
            if (sessionId && eventSource) {
                const url = '/api/abort';
                const body = JSON.stringify({ sessionId });
                if (navigator.sendBeacon) navigator.sendBeacon(url, body);
                else fetch(url, { method: 'POST', body, headers: { 'Content-Type': 'application/json' }, keepalive: true });
            }
        });
    </script>
</body>
</html>
