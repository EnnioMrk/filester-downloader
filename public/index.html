<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filester Downloader</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
        }
        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 0.5rem;
            background: #3b82f6;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        .files { display: flex; flex-direction: column; gap: 0.5rem; }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
        }
        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 1rem;
        }
        .status { color: #64748b; font-size: 0.85rem; }
        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fecaca;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .progress-container {
            display: none;
            margin-bottom: 1.5rem;
        }
        .progress-message {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #e2e8f0;
        }
        .progress-bar-wrapper {
            background: #1e293b;
            border-radius: 0.5rem;
            height: 1.5rem;
            overflow: hidden;
        }
        .progress-bar {
            background: #3b82f6;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-time {
            margin-top: 0.3rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .message-history {
            margin-top: 0.5rem;
            max-height: 220px;
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.5rem;
            font-size: 0.85rem;
        }
        .history-entry {
            padding: 0.25rem 0;
            border-bottom: 1px solid #0f172a;
            color: #e2e8f0;
            word-break: break-word;
        }
        .history-entry:last-child {
            border-bottom: none;
        }
        .history-entry.history-done {
            color: #22c55e;
            font-weight: 500;
        }
        .history-entry.history-error {
            color: #fecaca;
        }
    </style>
</head>
<body>
    <h1>Filester Downloader</h1>
    <div id="error" class="error" style="display: none;"></div>
    <div class="input-group">
        <input type="text" id="url" placeholder="https://filester.si/f/..." />
        <button id="fetch" onclick="fetchFiles()">Fetch & Download All</button>
    </div>
    <div id="progress-container" class="progress-container">
        <div id="progress-message" class="progress-message"></div>
        <div class="progress-bar-wrapper">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-time" class="progress-time"></div>
        <div id="message-history" class="message-history"></div>
    </div>
    <div id="files" class="files"></div>

    <script>
        let eventSource = null;
        let sessionId = null;
        let isRunning = false;
        let reconnectTimer = null;
        let nextReconnectDelay = 0;

        function connectStream(sid) {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource(`/api/stream?sessionId=${sid}`);

            eventSource.onopen = () => {
                nextReconnectDelay = 0;
                const btn = document.getElementById('fetch');
                if (btn) {
                    btn.textContent = 'Running...';
                }
            };

            eventSource.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    updateProgress(data);
                } catch {}
            };

            eventSource.onerror = () => {
                eventSource.close();
                eventSource = null;

                if (isRunning) {
                    const delay = nextReconnectDelay;
                    nextReconnectDelay = 500;
                    reconnectTimer = setTimeout(() => {
                        reconnectTimer = null;
                        if (isRunning) {
                            connectStream(sid);
                        }
                    }, delay);
                }
            };
        }

        function resetProgress() {
            const container = document.getElementById('progress-container');
            const history = document.getElementById('message-history');
            if (container) {
                container.style.display = 'none';
                document.getElementById('progress-bar').style.width = '0%';
                document.getElementById('progress-message').textContent = '';
                document.getElementById('progress-time').textContent = '';
            }
            if (history) {
                history.innerHTML = '';
            }
        }

        function addLogEntry(text, type) {
            const history = document.getElementById('message-history');
            if (!history) return;
            const entry = document.createElement('div');
            entry.className = 'history-entry';
            if (type === 'done') entry.classList.add('history-done');
            if (type === 'error') entry.classList.add('history-error');
            entry.textContent = text;
            history.prepend(entry);
            while (history.children.length > 50) {
                history.removeChild(history.lastChild);
            }
        }

        function updateProgress(data) {
            const container = document.getElementById('progress-container');
            const bar = document.getElementById('progress-bar');
            const msg = document.getElementById('progress-message');
            const time = document.getElementById('progress-time');

            if (!container || !bar || !msg || !time) return;

            container.style.display = 'block';

            if (data.type === 'heartbeat') {
                return;
            }

            if (data.type === 'progress') {
                const percent = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
                bar.style.width = percent + '%';
                msg.textContent = data.message || '';

                const remaining = data.total - data.current;
                let eta = '--';
                if (data.elapsed && data.elapsed > 0 && data.current > 0 && remaining > 0) {
                    const etaSeconds = ((data.elapsed / data.current) * remaining).toFixed(1);
                    eta = `~${Math.ceil(parseFloat(etaSeconds))}s`;
                }
                time.textContent = `${percent}% · ${data.current}/${data.total} · ETA ${eta}`;

                const message = data.message || '';
                const loggable =
                    message.startsWith('Page info:') ||
                    message.startsWith('Discovered') ||
                    message.startsWith('Resolved') ||
                    message.startsWith('Packed') ||
                    message.startsWith('Starting download') ||
                    (data.current === data.total && data.total > 0);

                if (loggable) {
                    addLogEntry(message, 'progress');
                }
            } else if (data.type === 'info') {
                msg.textContent = data.message || '';
                if (data.message && !data.message.includes('Attempt ')) {
                    addLogEntry(data.message, 'info');
                }
            } else if (data.type === 'done') {
                bar.style.width = '100%';
                time.textContent = '100% · Complete';
                msg.textContent = data.message || 'Done';
                addLogEntry(data.message || 'All done', 'done');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function escapeHtml(str) {
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        async function fetchFiles() {
            const url = document.getElementById('url').value.trim();
            const errorEl = document.getElementById('error');
            const filesEl = document.getElementById('files');
            const btn = document.getElementById('fetch');

            if (!url) {
                showError('Please enter a URL');
                return;
            }

            errorEl.style.display = 'none';
            filesEl.innerHTML = '';
            resetProgress();

            sessionId = Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

            isRunning = true;
            connectStream(sessionId);

            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                const res = await fetch('/api/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, sessionId })
                });
                const data = await res.json();

                if (!res.ok || data.error) {
                    throw new Error(data.error || 'Failed to fetch files');
                }

                if (data.files.length === 0) {
                    filesEl.innerHTML = '<div style="color:#94a3b8; text-align:center; padding:1rem;">No files found</div>';
                    return;
                }

                btn.textContent = 'Downloading...';

                const folderMatch = url.match(/\/f\/([^?]+)/);
                const folderName = folderMatch ? folderMatch[1] : 'files';

                if (data.files.length === 1) {
                    const file = data.files[0];
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.innerHTML = `
                        <span class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</span>
                        <span class="status">Starting...</span>
                    `;
                    filesEl.appendChild(div);

                    setTimeout(() => {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = `/api/download?server=${encodeURIComponent(file.server)}&file=${encodeURIComponent(file.file)}&token=${encodeURIComponent(file.token)}&name=${encodeURIComponent(file.name)}`;
                        document.body.appendChild(iframe);
                        setTimeout(() => iframe.remove(), 15000);
                        div.querySelector('.status').textContent = 'Started ✅';
                        div.querySelector('.status').style.color = '#22c55e';
                    }, 300);
                } else {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.innerHTML = `
                        <span class="file-name">Downloading ${data.files.length} files as ZIP...</span>
                        <span class="status">Preparing...</span>
                    `;
                    filesEl.appendChild(div);

                    const zipRes = await fetch('/api/download-zip', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ files: data.files, folderName, sessionId }),
                    });

                    if (!zipRes.ok) {
                        const errData = await zipRes.json().catch(() => ({}));
                        throw new Error(errData.error || 'Failed to create zip');
                    }

                    const zipBlob = await zipRes.blob();
                    const zipUrl = URL.createObjectURL(zipBlob);
                    const a = document.createElement('a');
                    a.href = zipUrl;
                    a.download = folderName + '.zip';
                    a.click();
                    URL.revokeObjectURL(zipUrl);

                    div.querySelector('.status').textContent = 'Done ✅';
                    div.querySelector('.status').style.color = '#22c55e';

                    data.files.forEach(file => {
                        const fdiv = document.createElement('div');
                        fdiv.className = 'file-item';
                        fdiv.innerHTML = `<span class="file-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</span><span class="status" style="color:#22c55e;">Packed ✅</span>`;
                        filesEl.appendChild(fdiv);
                    });
                }
            } catch (err) {
                showError(err.message);
            } finally {
                isRunning = false;
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                }
                btn.disabled = false;
                btn.textContent = 'Fetch & Download All';
            }
        }

        document.getElementById('url').addEventListener('keydown', e => {
            if (e.key === 'Enter') fetchFiles();
        });
    </script>
</body>
</html>
